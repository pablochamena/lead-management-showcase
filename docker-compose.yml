version: '3.8'

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    container_name: crm_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_lead_management}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-crm_lead_management}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/workspace
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-crm_lead_management}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/workspace
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - crm_network

      